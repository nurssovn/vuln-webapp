spring.application.name=vuln-webapp
server.port=8080

# H2 embedded database (no MySQL required)
spring.datasource.url=jdbc:h2:file:./data/vulndb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Intentionally weak session settings (authentication flaws demo)
server.servlet.session.cookie.http-only=false
server.servlet.session.cookie.secure=false
