<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | VulnShop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header class="topbar">
    <div class="container nav">
        <a class="logo" th:href="@{/}">VulnShop</a>
    </div>
</header>

<main class="container narrow">
    <section class="panel">
        <h1>Login</h1>
        <p class="hint">Vulnerable to SQL Injection. Example payload: <code>' OR '1'='1</code></p>

        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form method="post" th:action="@{/login}" class="form">
            <label>Username
                <input type="text" name="username" th:value="${username}" required>
            </label>
            <label>Password
                <input type="password" name="password" required>
            </label>
            <button type="submit" class="btn primary">Sign in</button>
        </form>
    </section>
</main>
</body>
</html>
